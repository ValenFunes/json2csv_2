name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: write        # needed to push docs and bump BUILD

jobs:
  # -------------------------------------------------------------------------
  # Lint & type checks
  # -------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      # --- ruff (PEP 8 + lint rules) ----------------------------------------
      - name: ruff check
        run: ruff check src/ tests/

      # --- black (formatting) -----------------------------------------------
      - name: black check
        run: black --check src/ tests/

      # --- pydocstyle (PEP 257) ---------------------------------------------
      - name: pydocstyle
        run: pydocstyle src/json2csv/

      # --- mypy (strict) ----------------------------------------------------
      - name: mypy
        run: mypy src/

      # --- pyright ----------------------------------------------------------
      - name: pyright
        run: pyright src/

  # -------------------------------------------------------------------------
  # Security
  # -------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bandit
        run: pip install "bandit[toml]>=1.7"

      - name: bandit
        run: bandit -r src/ -c pyproject.toml -ll

  # -------------------------------------------------------------------------
  # Tests
  # -------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint, security]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: pytest (coverage ≥ 85 %)
        run: pytest

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # -------------------------------------------------------------------------
  # Docs + BUILD bump (only on push to main/master after successful tests)
  # -------------------------------------------------------------------------
  docs:
    name: Generate Docs & Bump BUILD
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdoc
          pip install -e .

      - name: Generate docs with pdoc
        run: pdoc src/json2csv -o docs/

      - name: Bump BUILD number
        run: |
          BUILD=$(cat BUILD)
          echo $((BUILD + 1)) > BUILD

      - name: Commit docs and BUILD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ BUILD
          git diff --cached --quiet || git commit -m "docs: auto-update docs and bump BUILD [skip ci]"
          git push
